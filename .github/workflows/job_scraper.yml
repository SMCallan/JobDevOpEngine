name: Daily Job Search Pipeline

on:
  schedule:
    # Runs at 10:00 AM UTC every day
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  run-scraper:
    name: Fetch and Process Jobs
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 🛑 Best Practice: Prevents infinite hangs if APIs go down

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # ⚡ Best Practice: Caches dependencies to speed up the run

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Scraper
        # 🔐 Bridge connecting GitHub Secrets to Python OS Environment Variables
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: python scraper.py
